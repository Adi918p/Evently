<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventify-Enjoy Events Near You</title>
    <style>
        * {
            color: white;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, sans-serif;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }

        body {
            background: #09090b;
            color: white;
        }

        .sect {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 850px;
        }

        .container {
            width: 90%;
            max-width: 1400px;
            margin: auto;
        }

        /* HERO */

        .hero {
            position: relative;
            height: 90vh;

        }

        .hero-overlay {
            position: absolute;
            inset: 0;

            background:
                linear-gradient(to top,
                    rgba(0, 0, 0, .95),
                    rgba(0, 0, 0, .3));
        }

        .hero-content {
            position: absolute;
            bottom: 80px;
            left: 5%;
            max-width: 700px;
            z-index: 10;
        }

        .event-tag {
            padding: 8px 15px;
            border-radius: 50px;

            background: rgba(124, 58, 237, .2);
            border: 1px solid #7c3aed;
        }

        .hero h1 {
            font-size: 4rem;
            margin-top: 20px;
        }

        .hero-desc {
            margin-top: 15px;
            color: #b3b3b3;
        }

        .hero-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .hero-buttons {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        /* BUTTONS */

        .primary-btn,
        .secondary-btn {
            border: none;
            cursor: pointer;
            padding: 14px 24px;
            border-radius: 12px;
        }

        .primary-btn {
            color: white;

            background:
                linear-gradient(135deg,
                    #7c3aed,
                    #2563eb);
        }

        .secondary-btn {
            color: white;
            background: #1b1b1f;
        }

        /* INFO CARDS */

        .info-cards {
            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(220px, 1fr));

            gap: 20px;

            margin-top: -60px;
            position: relative;
            z-index: 20;
        }

        .info-card {
            padding: 25px;

            background:
                rgba(255, 255, 255, .05);

            backdrop-filter: blur(20px);

            border:
                1px solid rgba(255, 255, 255, .08);

            border-radius: 20px;

            text-align: center;
        }

        .info-card i {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        /* LAYOUT */

        .page-layout {
            display: grid;

            grid-template-columns:
                1fr 350px;

            gap: 40px;

            margin-top: 60px;
        }

        /* SECTION */

        .sbox {
            margin-bottom: 80px;
        }

        .sbox h2 {
            margin-bottom: 25px;
            font-size: 2rem;
        }

        /* GALLERY */

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            border-radius: 15px;
            transition: .3s;
        }

        .gallery img:hover {
            transform: scale(1.03);
        }

        /* ARTISTS */

        .artists {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .artist-card {
            background: #111827;
            border-radius: 20px;
            overflow: hidden;
        }

        .artist-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .artist-card h3 {
            padding: 20px;
        }

        /* TIMELINE */

        .timeline {
            border-left: 2px solid #7c3aed;
            padding-left: 25px;
        }

        .timeline-item {
            margin-bottom: 30px;
        }

        .timeline-item span {
            color: #7c3aed;
            font-weight: bold;
        }

        /* MAP */

        .venue-box iframe {
            width: 100%;
            height: 350px;
            margin-top: 20px;
            border: none;
            border-radius: 15px;
        }

        /* REVIEWS */

        .reviews {
            display: grid;
            gap: 20px;
        }

        .review-card {
            padding: 25px;
            border-radius: 20px;
            background: #111827;
        }

        /* SIMILAR */

        .similar-events {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .similar-card {
            overflow: hidden;
            border-radius: 20px;
            background: #111827;
        }

        .similar-card img {
            width: 100%;
        }

        .similar-card h3 {
            padding: 20px;
        }

        /* TICKET PANEL */

        .ticket-panel {
            position: relative;
        }

        .ticket-card {
            position: sticky;
            top: 105px;

            background: #111827;

            padding: 25px;
            border-radius: 20px;
        }

        .ticket-option {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }

        .full {
            width: 100%;
        }

        /* MOBILE BOOK BUTTON */

        .mobile-book {
            display: none;
        }

        @media(max-width:1000px) {

            .page-layout {
                grid-template-columns: 1fr;
            }

            .ticket-panel {
                display: none;
            }

            .hero h1 {
                font-size: 3rem;
            }

            .mobile-book {
                display: block;
                position: fixed;
                bottom: 20px;
                left: 20px;
                right: 20px;
                z-index: 100;
            }

            .mobile-book button {
                width: 100%;
                padding: 16px;

                border: none;

                border-radius: 15px;

                color: white;

                background:
                    linear-gradient(135deg,
                        #7c3aed,
                        #2563eb);
            }

            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
