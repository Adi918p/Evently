<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Create Event</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0a0a0a;
            color: white;
        }

        .container {
            width: 50%;
            margin: 100px auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        input,
        textarea {
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #7c3aed;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5b21b6;
        }
    </style>
<link rel="stylesheet" href="/css/responsive.css">
</head>

<body>

    <div class="container">

        <h1>Create Event</h1>

        <form id="eventForm">

            <input type="text" id="title" placeholder="Event Title" required>

            <textarea id="description" placeholder="Description"></textarea>

            <textarea id="about" placeholder="About Event"></textarea>

            <input type="text" id="venue" placeholder="Venue">

            <input type="text" id="location" placeholder="Location">

            <input type="date" id="date">

            <input type="time" id="time">

            <input type="number" id="price" placeholder="Price">

            <input type="text" id="agelim" placeholder="Age Limit">

            <input type="number" id="seats" placeholder="Total Seats">

            <input type="text" id="banner" placeholder="Banner URL">

            <input type="text" id="maploc" placeholder="Google Map Link">

            <textarea id="gallery" placeholder="Gallery (comma separated URLs)"></textarea>

            <textarea id="lineup" placeholder="Lineup (name:image,url format)"></textarea>

            <button type="submit">Create Event</button>

        </form>

    </div>

    <script>
        document
            .getElementById("eventForm")
            .addEventListener("submit", async (e) => {

                e.preventDefault();

                const token = localStorage.getItem("token");

                const gallery =
                    document.getElementById("gallery")
                        .value
                        .split(",")
                        .map(img => img.trim());

                const lineupRaw =
                    document.getElementById("lineup").value;

                const lineup = lineupRaw
                    .split(",")
                    .map(item => {
                        const [name, image] = item.split(":");
                        return { name, image };
                    });

                const data = {
                    title: document.getElementById("title").value,
                    description: document.getElementById("description").value,
                    about: document.getElementById("about").value,
                    venue: document.getElementById("venue").value,
                    location: document.getElementById("location").value,
                    date: document.getElementById("date").value,
                    time: document.getElementById("time").value,
                    price: document.getElementById("price").value,
                    agelim: document.getElementById("agelim").value,
                    seats: document.getElementById("seats").value,
                    banner: document.getElementById("banner").value,
                    maploc: document.getElementById("maploc").value,
                    gallery,
                    lineup
                };

                const res = await fetch("/api/events", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (result.success) {
                    alert("Event Created Successfully");
                    window.location.href = "/dashboard.html";
                }
                else {
                    alert(result.message);
                }

            });
    </script>

</body>

</html>
