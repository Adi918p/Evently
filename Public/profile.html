<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventify-Enjoy Events Near You</title>
    <style>
        body {
            background: #09090b;
            color: white;
        }

        .profile-page {

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: calc(var(--nav-height) + 30px) 20px 40px;
        }

        .profile-card {

            width: 900px;

            background:
                rgba(255, 255, 255, .05);

            backdrop-filter: blur(20px);

            border:
                1px solid rgba(255, 255, 255, .08);

            border-radius: 30px;

            padding: 40px;

            box-shadow:
                0 20px 60px rgba(0, 0, 0, .4);
        }

        .profile-header {

            display: flex;
            align-items: center;
            gap: 30px;

            margin-bottom: 40px;
        }

        #avatar {

            width: 120px;
            height: 120px;

            border-radius: 50%;

            object-fit: cover;

            border: 4px solid #7c3aed;
        }

        #name {

            font-size: 2.5rem;

            margin-bottom: 10px;
        }

        #email {

            color: #94a3b8;
        }

        .profile-stats {

            display: grid;

            grid-template-columns:
                repeat(3, 1fr);

            gap: 20px;
        }

        .stat-card {

            background: #111827;

            border-radius: 20px;

            padding: 30px;

            text-align: center;
        }

        .stat-card h2 {

            font-size: 2rem;

            margin-bottom: 10px;

            background:
                linear-gradient(135deg,
                    #8b5cf6,
                    #3b82f6);

            -webkit-background-clip: text;

            color: transparent;
        }

        .profile-actions {

            margin-top: 40px;

            display: flex;
            gap: 20px;
        }

        .profile-actions button {

            border: none;

            padding: 14px 25px;

            border-radius: 15px;

            cursor: pointer;

            background:
                linear-gradient(135deg,
                    #7c3aed,
                    #2563eb);

            color: white;
        }

        #userDropdown {
            display: block;
        }

        #logw {
            display: none;
        }
    </style>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/nav.css">
</head>

<body>

        <div id="nav">
            <a href="/"><img class="logo" src="/Media/Png/logo.jpg" alt="logo"></a>
            <div class="navbar">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/index.html#trending">Events</a></li>
                    <li><a href="/Exp.html">Experience</a></li>
                    <li><a href="/contact.html">Contact Us</a></li>
                </ul>
            </div>
            <div class="logsec" id="logw">
                <button class="btn" id="log" onclick="window.location.href = '/login.html?mode=login'">Log In</button>
                <button class="btn grad" id="sup" onclick="window.location.href = '/login.html?mode=signup'">Sign
                    Up</button>
            </div>
            <div id="userDropdown" class="user-dropdown hidden">

                <button id="dropdownBtn" class="dropdown-btn">
                    👤 <span id="username">User</span> ▼
                </button>

                <div id="dropdownMenu" class="dropdown-menu hidden">
                    <a href="/profile.html">My Profile</a>
                    <a href="/mybookings.html">My Bookings</a>
                    <a id="dashboardItem" href="/dashboard.html">Dashboard</a>

                    <button id="logoutBtn">Logout</button>

                </div>

            </div>
        </div>

    <section class="profile-page">

        <div class="profile-card">

            <div class="profile-header">

                <img id="avatar" src="/Media/Png/pfp.jpg">

                <div>

                    <h1 id="name">
                        Loading...
                    </h1>

                    <p id="email">
                        Loading...
                    </p>

                </div>

            </div>

            <div class="profile-stats">

                <div class="stat-card">
                    <h2 id="bookingsCount">0</h2>
                    <span>Bookings</span>
                </div>

                <div class="stat-card">
                    <h2 id="role">User</h2>
                    <span>Role</span>
                </div>

                <div class="stat-card">
                    <h2>Active</h2>
                    <span>Status</span>
                </div>

            </div>
            <div class="profile-actions">

                <button>
                    Edit Profile
                </button>

                <button onclick="window.location.href='/mybookings.html'">
                    My Bookings
                </button>

            </div>

        </div>

    </section>
<script src="/js/nav.js"></script>
</body>
<script>
        const user = getUserFromToken();

    const dashboardItem =
        document.getElementById("dashboardItem");

    if (user &&
        (user.role === "admin" ||
            user.role === "organizer")) {

        dashboardItem.style.display = "block";

    } else {

        dashboardItem.style.display = "none";

    }
    async function loadProfile() {

        const token =
            localStorage.getItem("token");

        if (!token) {

            window.location.href =
                "/login.html";

            return;
        }

        const res =
            await fetch("/api/auth/me", {

                headers: {
                    Authorization:
                        `Bearer ${token}`
                }

            });

        const data =
            await res.json();
            

        document.getElementById("name")
            .innerText =
            data.user.name;

        document.getElementById("email")
            .innerText =
            data.user.email;

        document.getElementById("role")
            .innerText =
            data.user.role || "User";

        const avatar = document.getElementById("avatar");

        if (
            data.user.avatar &&
            data.user.avatar.trim() !== ""
        ) {
            avatar.src = data.user.avatar;
        }

    }
function updateAuthUI() {

    const user = getUserFromToken();
    

    const logsec = document.getElementById("logw");

    const dropdown = document.getElementById("userDropdown");
    const username = document.getElementById("username");

    if (user) {

        // hide login/signup
        if (logsec) logsec.style.display = "none";

        // show dropdown
        dropdown.classList.remove("hidden");

        username.innerText = user.name;

    } else {

        if (logBtn) logBtn.style.display = "block";
        if (signBtn) signBtn.style.display = "block";

        dropdown.classList.add("hidden");
    }
}
    function getUserFromToken() {
        const token = localStorage.getItem("token");
        if (!token) return null;

        try {
            return JSON.parse(atob(token.split(".")[1]));
        } catch {
            return null;
        }
    }
    const btn = document.getElementById("dropdownBtn");
    const menu = document.getElementById("dropdownMenu"); 
    btn.addEventListener("click", () => {
        menu.classList.toggle("hidden");
    });
    document.addEventListener("click", (e) => {
        if (!e.target.closest(".user-dropdown")) {
            menu?.classList.add("hidden");
        }
    });
    document.getElementById("logoutBtn")?.addEventListener("click", () => {
        localStorage.removeItem("token");
        location.reload();
    });
    updateAuthUI();
    loadProfile();

</script>

</html>
